# ============================================================
# Smart GST Billing & Compliance Engine - Application Config
# ============================================================

# Server
server.port=8080

# ---- MySQL DataSource ----
spring.datasource.url=jdbc:mysql://localhost:3306/gst_billing_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ---- JWT ----
app.jwt.secret=SmartGSTBillingSecretKey2024@#$%VeryLongSecretForHS256Algorithm
app.jwt.expiration-ms=86400000

# ---- Business Details (shown on PDF invoices) ----
app.business.name=My Business Pvt Ltd
app.business.gstin=27AABCU9603R1ZX
app.business.address=123 Business Road, Mumbai, Maharashtra - 400001
app.business.phone=+91-9876543210
app.business.email=billing@mybusiness.com
app.business.state=Maharashtra

# ---- Thymeleaf ----
spring.thymeleaf.cache=false

# ---- Logging ----
logging.level.com.gst=DEBUG
logging.level.org.springframework.security=INFO
