<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — Smart GST Billing</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <h1>🧾 Smart GST Billing</h1>
    <p class="subtitle">Sign in to your account</p>

    <div id="alert-area"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Sign In</button>
    </form>

    <p style="margin-top:18px; text-align:center; font-size:13px; color:#6c757d;">
      Don't have an account? <a href="/register" style="color:#0d6efd;">Register</a>
    </p>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  // Redirect if already logged in
  if (getToken()) window.location.href = '/dashboard';

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    setLoading(btn, true);
    try {
      const data = await api.post('/auth/login', {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      });
      setAuth(data);
      window.location.href = '/dashboard';
    } catch (err) {
      showAlert('alert-area', err.message, 'danger');
      setLoading(btn, false);
    }
  });
</script>
</body>
</html>
