<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard — Smart GST Billing</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2>🧾 GST Billing</h2>
      <span>Compliance Engine</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard"><span class="icon">📊</span> Dashboard</a>
      <a href="/products"><span class="icon">📦</span> Products</a>
      <a href="/customers"><span class="icon">👥</span> Customers</a>
      <a href="/invoices"><span class="icon">🧾</span> Invoices</a>
      <a href="/reports"><span class="icon">📈</span> Reports</a>
    </nav>
    <div class="sidebar-footer">
      <div style="font-size:12px;color:rgba(255,255,255,.5);margin-bottom:8px;">
        <span id="sidebar-username">User</span> · <span id="sidebar-role"></span>
      </div>
      <button class="logout-btn" onclick="logout()">↩ Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <header class="topbar">
      <h1>Dashboard</h1>
      <span class="user-info">Welcome back, <strong id="top-username"></strong></span>
    </header>

    <div class="page-body">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">Total Invoices</div>
          <div class="value" id="stat-invoices">—</div>
        </div>
        <div class="stat-card green">
          <div class="label">Total Revenue</div>
          <div class="value" id="stat-revenue">—</div>
        </div>
        <div class="stat-card orange">
          <div class="label">GST Collected</div>
          <div class="value" id="stat-gst">—</div>
        </div>
        <div class="stat-card red">
          <div class="label">Customers</div>
          <div class="value" id="stat-customers">—</div>
        </div>
      </div>

      <!-- Recent invoices -->
      <div class="card">
        <div class="card-header">
          <h2>Recent Invoices</h2>
          <a href="/invoices" class="btn btn-outline btn-sm">View All</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Invoice #</th>
                <th>Date</th>
                <th>Customer</th>
                <th class="text-right">Taxable</th>
                <th class="text-right">GST</th>
                <th class="text-right">Total</th>
              </tr>
            </thead>
            <tbody id="recent-invoices">
              <tr><td colspan="6" class="empty-state">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  requireAuth();
  document.getElementById('top-username').textContent = getUser().username || '';

  async function loadDashboard() {
    try {
      const [invoices, customers] = await Promise.all([
        api.get('/invoices'),
        api.get('/customers'),
      ]);

      document.getElementById('stat-invoices').textContent = invoices.length;
      document.getElementById('stat-customers').textContent = customers.length;

      const total = invoices.reduce((s, i) => s + parseFloat(i.totalAmount || 0), 0);
      const gst   = invoices.reduce((s, i) =>
        s + parseFloat(i.totalCgst || 0) + parseFloat(i.totalSgst || 0) + parseFloat(i.totalIgst || 0), 0);

      document.getElementById('stat-revenue').textContent = formatCurrency(total);
      document.getElementById('stat-gst').textContent     = formatCurrency(gst);

      const recent = invoices.slice(-10).reverse();
      const tbody = document.getElementById('recent-invoices');
      if (!recent.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No invoices yet. <a href="/invoices">Create one →</a></td></tr>';
        return;
      }
      tbody.innerHTML = recent.map(inv => {
        const totalGst = parseFloat(inv.totalCgst||0) + parseFloat(inv.totalSgst||0) + parseFloat(inv.totalIgst||0);
        return `<tr>
          <td><span class="badge badge-blue">${inv.invoiceNumber}</span></td>
          <td>${formatDate(inv.date)}</td>
          <td>${inv.customerName}</td>
          <td class="text-right">${formatCurrency(inv.taxableAmount)}</td>
          <td class="text-right text-green">${formatCurrency(totalGst)}</td>
          <td class="text-right fw-bold">${formatCurrency(inv.totalAmount)}</td>
        </tr>`;
      }).join('');
    } catch (err) {
      console.error(err);
    }
  }

  loadDashboard();
</script>
</body>
</html>
