<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register — Smart GST Billing</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <h1>🧾 Smart GST Billing</h1>
    <p class="subtitle">Create a new account</p>

    <div id="alert-area"></div>

    <form id="register-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Choose a username" minlength="3" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" minlength="6" required>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="role">
          <option value="USER">User</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Create Account</button>
    </form>

    <p style="margin-top:18px; text-align:center; font-size:13px; color:#6c757d;">
      Already have an account? <a href="/login" style="color:#0d6efd;">Sign In</a>
    </p>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  document.getElementById('register-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    setLoading(btn, true);
    try {
      await api.post('/auth/register', {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
        role: document.getElementById('role').value,
      });
      showAlert('alert-area', 'Account created! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = '/login', 1500);
    } catch (err) {
      showAlert('alert-area', err.message, 'danger');
      setLoading(btn, false);
    }
  });
</script>
</body>
</html>
